<!DOCTYPE html>
<html>
<head>
    <title>Lecturer Interface</title>
</head>
<body>
    <h1>Submit a Question and Marking Guide</h1>
    <form action="/lecturer" method="post">
        <label for="question_text">Question:</label><br>
        <textarea name="question_text" rows="4" cols="50"></textarea><br><br>
        <label for="marking_guide">Marking Guide:</label><br>
        <textarea name="marking_guide" rows="4" cols="50"></textarea><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
