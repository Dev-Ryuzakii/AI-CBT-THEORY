<!DOCTYPE html>
<html>
<head>
    <title>Student Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            width: 50%;
            margin: auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
        }
        textarea, select, input[type="text"], input[type="email"], input[type="submit"] {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        h1, h2 {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Interface</h1>
        <h2>Answer Questions</h2>
        <form action="/student" method="post">
            <div class="form-group">
                <label for="student_name">Name:</label>
                <input type="text" name="student_name" id="student_name" required>
            </div>
            <div class="form-group">
                <label for="student_email">Email:</label>
                <input type="email" name="student_email" id="student_email" required>
            </div>
            <div class="form-group">
                <label for="question_id">Question:</label>
                <select name="question_id" id="question_id">
                    {% for question in questions %}
                    <option value="{{ question.id }}">{{ question.question_text }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="answer">Your Answer:</label>
                <textarea name="answer" id="answer" rows="4" cols="50" required></textarea>
            </div>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
